# needrestart configuration
# https://github.com/liske/needrestart

# Auto-restart services after library updates without prompting.
$nrconf{restart} = 'a';

# Print kernel hints to stderr only — no interactive prompts.
$nrconf{kernelhints} = -1;

# Binaries to ignore (not daemons).
$nrconf{blacklist} = [
    qr(^/usr/bin/sudo(\.dpkg-new)?$),
    qr(^/sbin/(dhclient|dhcpcd5|pump|udhcpc)(\.dpkg-new)?$),
    qr(^/usr/bin/apt-get(\.dpkg-new)?$),
];

# Services to never restart automatically.
$nrconf{override_rc} = {
    # DBus
    qr(^dbus) => 0,

    # Display managers
    qr(^gdm) => 0, qr(^kdm) => 0, qr(^nodm) => 0,
    qr(^sddm) => 0, qr(^wdm) => 0, qr(^xdm) => 0,
    qr(^lightdm) => 0, qr(^slim) => 0, qr(^lxdm) => 0,

    # Networking
    qr(^bird) => 0,
    qr(^network) => 0,
    qr(^NetworkManager) => 0,
    qr(^ModemManager) => 0,
    qr(^wpa_supplicant) => 0,
    qr(^openvpn) => 0,
    qr(^quagga) => 0,
    qr(^frr) => 0,
    qr(^tinc) => 0,
    qr(^(open|free|libre|strong)swan) => 0,
    qr(^bluetooth) => 0,

    # Terminals / sessions
    qr(^getty@.+\.service) => 0,
    qr(^serial-getty@.+\.service) => 0,
    qr(^user@\d+\.service) => 0,

    # Virtualisation / containers
    qr(^zfs-fuse) => 0,
    qr(^lxcfs) => 0,
    qr(^libvirt) => 0,
    qr(^virtlogd) => 0,
    qr(^virtlockd) => 0,
    qr(^docker) => 0,

    # Cloud / system oneshots
    qr(^google-(shutdown|startup)-scripts\.service$) => 0,
    qr(^emergency\.service$) => 0,
    qr(^rescue\.service$) => 0,
    qr(^elogind) => 0,
    qr(^apt-daily\.service$) => 0,
    qr(^apt-daily-upgrade\.service$) => 0,
    qr(^unattended-upgrades\.service$) => 0,
    qr(^cloud-(init-local|init|config|final)\.service$) => 0,
    qr(^cron-.*\.service$) => 0,
    qr(^rc-local\.service$) => 0,
    qr(^systemd-logind) => 0,
};

$nrconf{override_cont} = {};

$nrconf{blacklist_interp} = [
    qr(^/tmp/), qr(^/var/), qr(^/run/),
];

$nrconf{blacklist_mappings} = [
    qr(^/(SYSV00000000( \(deleted\))?|drm(\s|$)|dev/)),
    qr(^/memfd:),
    qr(^/\[aio\]),
    qr#/orcexec\.[\w\d]+( \(deleted\))?$#,
    qr(/#\d+( \(deleted\))?$),
    qr#/jna\d+\.tmp( \(deleted\))?$#,
    qr#^(/var)?/tmp/#,
    qr#^(/var)?/run/#,
];

$nrconf{skip_mapfiles} = -1;

if(-d q(/etc/needrestart/conf.d)) {
    foreach my $fn (sort </etc/needrestart/conf.d/*.conf>) {
        eval do { local(@ARGV, $/) = $fn; <>};
        die "Error parsing $fn: $@" if($@);
    }
}
